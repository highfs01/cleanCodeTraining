  <body>
    <h1>Last weeks favourite plant was: Fremontadendron</h1>

    <div id="pollPanel"></div>

    <script>
      /*
          Just some structural suggestions to start with, feel free to rename & restructure as you see fit - these are very much not the function names I would suggest
          */
      let plants = [
        "violet",
        "lilly",
        "snowdrop",
        "rose",
        "poppy",
        "daffodil",
        "bluebell",
        "simon flower",
        "olamidaisy",
      ];

      function generateCheckboxesHtml(values, context) {
        const checkboxes = values.map((value) => {
          markup = `<div>
                      <label>
                      <input type="checkbox" id="${value}" name="${context}" value="${value}" />${value}</label>
                  </div>`;
          return markup;
        });
        return checkboxes.join('')
      }

      function renderHtml(html) {
        let pollPanelContainer = document.getElementById("pollPanel");
        pollPanelContainer.innerHTML = html;
      }

      const checkboxesHtml = generateCheckboxesHtml(plants, "plants");

      renderHtml(checkboxesHtml);

      function toAcknowledgeTheSubmitButtonPress() {}
    </script>
