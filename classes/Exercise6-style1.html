<!DOCTYPE html>
<html>

<head>
    <title>Classes - exercise 6 style 1 for discussion</title>

    <meta http-equiv='Content-Type' content='text/html; charset=iso-8859-1'>
    <meta http-equiv='Content-Language' content='EN'>
    <meta name='viewport' content='width=device-width, height=device-height, initial-scale=1.0' />

</head>

<body>
    <h1>Plant images and information</h1>
    <script>
        class Plant {
            // Pros - easy to code, flexible
            // Cons - difficult to read, can't be sure all props are there (or correct)
            // Would benefit from some validation/rules
            // Relies on an object literal for data passing
            constructor(props) {
                Object.assign(this, props);
            }

            information() {
                return `${this.commonName} can grow to ${this.height} high and spread to ${this.spread}`;
            }
        }

        const examplePlant = new Plant({
            latinName: "Papaver",
            commonName: "Poppy",
            image: "./images/poppy.jpg",
            height: "65cm",
            spread: "3cm",
            ph: 7,
            moisture: 4,
            colour: "Red",
            scent: "No",
            cultivation: "Seed",
            propagation: "Seed"
        });

        alert(examplePlant.information());
    </script>
</body>

</html>
