      /*

      const plantHtml = (function prepareHtml() {
        let markup = "";

        const numberOfTiles = plantsFormatted.length;
        for (let counter = 0; counter < numberOfTiles; counter++) {
          markup += `<div class='tile'><div class='swap'>
            <img src='${plantsFormatted[counter].pic}'  width='260' height='200' />
            <span class='hover-content'>PUT INFORMATION HERE</span><br/></div>
            <span class='link'><a href='${plantsFormatted[counter].link}' target='_blank'>More information on ${plantsFormatted[counter].label}</a></span></div>`;
        }
        return markup;
      })();

      (function renderHtml(plantHtml) {
        document.getElementById("webpageContentWrapper").innerHTML = plantHtml;
      })(plantHtml);
    </script>
